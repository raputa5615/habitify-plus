<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>habitify+ - 매일 조금씩</title>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_32x32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon_64x64.png">
  <link rel="icon" type="image/png" sizes="256x256" href="favicon_256x256.png">
  <link rel="apple-touch-icon" href="favicon_256x256.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf9;
      color: #1f2937;
      font-size: 16px;
      min-height: 100vh;
      padding: 60px 16px 40px;
    }

    .hero {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      color: #10b981;
    }

    .hero p {
      margin-top: 8px;
      font-size: 16px;
      color: #6b7280;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 32px;
    }

    .input-row input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 16px;
      color: #1f2937;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      outline: none;
      background: #ffffff;
    }

    .input-row input:focus {
      border-color: #10b981;
    }

    .input-row button {
      min-width: 44px;
      min-height: 44px;
      padding: 0.75rem 1.5rem;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background: #10b981;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .input-row button:hover {
      background: #059669;
    }

    .habit-list {
      list-style: none;
      margin-top: 24px;
      text-align: left;
    }

    .habit-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 12px 0;
      font-size: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .habit-list input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #10b981;
    }

    .habit-list li.done .habit-name {
      text-decoration: line-through;
      color: #aaaaaa;
    }

    .streak-badge {
      margin-left: auto;
      font-size: 0.9rem;
      color: #888888;
      white-space: nowrap;
    }

    .streak-badge.active {
      color: #f97316;
      font-weight: 600;
    }

    .empty-state {
      margin-top: 24px;
      font-size: 16px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Habitify+</h1>
    <p>작은 습관에서 시작하기</p>
    <div class="input-row">
      <input id="habitInput" type="text" placeholder="새 습관을 입력하세요">
      <button onclick="addHabit()">추가</button>
    </div>
    <ul class="habit-list" id="habitList"></ul>
    <p class="empty-state" id="emptyState">오늘 어떤 습관을 만들고 싶나요?<br>작게 시작해도 좋아요.</p>
  </div>
  <script>
    // 로컬 날짜를 YYYY-MM-DD 형식으로 반환
    function getLocalDate(offset) {
      const d = new Date();
      d.setDate(d.getDate() + (offset || 0));
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // localStorage에서 습관 목록 불러오기
    function loadHabits() {
      return JSON.parse(localStorage.getItem('habits') || '[]');
    }

    // localStorage에 습관 목록 저장
    function saveHabits(habits) {
      localStorage.setItem('habits', JSON.stringify(habits));
    }

    // 화면에 습관 하나를 렌더링
    function renderHabit(habit, index) {
      const li = document.createElement('li');
      if (habit.done) li.classList.add('done');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = habit.done;
      cb.addEventListener('change', function() {
        const habits = loadHabits();
        habits[index].done = cb.checked;

        if (cb.checked) {
          const todayStr = getLocalDate();
          const last = habits[index].lastCheckedDate;

          if (last === todayStr) {
            // 오늘 이미 체크함 - streak 유지
          } else if (last === getLocalDate(-1)) {
            // 어제 체크했으면 연속 - streak 증가
            habits[index].streak = (habits[index].streak || 0) + 1;
            habits[index].lastCheckedDate = todayStr;
          } else {
            // 처음이거나 하루 이상 건너뜀 - streak 1로 시작
            habits[index].streak = 1;
            habits[index].lastCheckedDate = todayStr;
          }
        }

        saveHabits(habits);
        renderAll();
      });

      const nameSpan = document.createElement('span');
      nameSpan.className = 'habit-name';
      nameSpan.textContent = habit.text;

      const streak = habit.streak || 0;
      const badge = document.createElement('span');
      badge.className = 'streak-badge' + (streak > 0 ? ' active' : '');
      badge.textContent = `🔥 ${streak}`;

      li.appendChild(cb);
      li.appendChild(nameSpan);
      li.appendChild(badge);
      return li;
    }

    // 전체 습관 목록 렌더링
    function renderAll() {
      const habits = loadHabits();
      const list = document.getElementById('habitList');
      list.innerHTML = '';
      habits.forEach(function(habit, i) {
        list.appendChild(renderHabit(habit, i));
      });
      document.getElementById('emptyState').style.display = habits.length === 0 ? '' : 'none';
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const text = input.value.trim();
      if (!text) return;

      const habits = loadHabits();
      habits.push({ text: text, done: false, streak: 0, lastCheckedDate: null });
      saveHabits(habits);
      renderAll();

      input.value = '';
      input.focus();
    }

    document.getElementById('habitInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addHabit();
    });

    // 날짜가 바뀌면 done 상태 초기화
    function resetDailyDone() {
      const habits = loadHabits();
      const todayStr = getLocalDate();
      let changed = false;
      habits.forEach(function(habit) {
        if (habit.done && habit.lastCheckedDate !== todayStr) {
          habit.done = false;
          changed = true;
        }
      });
      if (changed) saveHabits(habits);
    }

    // 페이지 로드 시 날짜 초기화 후 렌더링
    resetDailyDone();
    renderAll();
  </script>
</body>
</html>
